mpi_type:
  - external
  - conda
# this hack is required for libtool on arm64, which doesn't know about 11.x deployment targets ...
MACOSX_DEPLOYMENT_TARGET:  # [osx and arm64]
  - 10.15                  # [osx and arm64]
CONDA_BUILD_SYSROOT:        # [osx and arm64]
  - /opt/MacOSX10.15.sdk    # [osx and arm64]